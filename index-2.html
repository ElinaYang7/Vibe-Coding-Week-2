<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Slang Compiler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #080810;
      color: #d0d0e0;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ---- HEADER ---- */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #1e1e30;
    }
    h1 {
      font-size: 1.8rem;
      letter-spacing: 6px;
      color: #b89eff;
      text-transform: uppercase;
    }
    .subtitle {
      margin-top: 0.5rem;
      color: #606080;
      font-size: 0.8rem;
      letter-spacing: 2px;
    }

    /* ---- SECTIONS ---- */
    .section { margin-bottom: 1.6rem; }

    label, .section-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: #606080;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    /* ---- INPUT ---- */
    input[type="text"] {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #10101c;
      border: 1px solid #2a2a40;
      color: #d0d0e0;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #b89eff; }
    input[type="text"]::placeholder { color: #404060; }

    /* ---- CHIPS ---- */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }
    .chip {
      padding: 0.2rem 0.6rem;
      background: none;
      border: 1px solid #2a2a40;
      color: #606080;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      transition: all 0.15s;
    }
    .chip:hover { border-color: #b89eff; color: #b89eff; }

    /* ---- BUTTON GROUP ---- */
    .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .btn {
      padding: 0.5rem 1rem;
      background: #10101c;
      border: 1px solid #2a2a40;
      color: #606080;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 1px;
      transition: all 0.15s;
    }
    .btn:hover { border-color: #b89eff; color: #b89eff; }
    .btn.active { border-color: #b89eff; color: #b89eff; background: #1a1030; }

    /* ---- COMPILE BUTTON ---- */
    .compile-btn {
      padding: 0.7rem 2.2rem;
      background: #b89eff;
      color: #080810;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: background 0.15s;
    }
    .compile-btn:hover { background: #9a7fef; }
    .compile-btn:disabled { background: #2a2a40; color: #404060; cursor: not-allowed; }

    hr { border: none; border-top: 1px solid #1e1e30; margin: 1.8rem 0; }

    /* ---- WORD GRID ---- */
    .word-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 0.5rem;
      padding: 1rem;
      background: #0c0c18;
      border: 1px solid #1e1e30;
      min-height: 120px;
      line-height: 1.8;
    }

    .word-token {
      font-size: 0.85rem;
      color: #a0a0c0;
      opacity: 0;
      transition: opacity 0.25s ease;
      cursor: default;
    }
    .word-token.visible { opacity: 1; }

    /* intrusion words: red tint with bracket markers */
    .word-token.intrusion {
      color: #ff7070;
      position: relative;
    }
    .word-token.intrusion::before { content: "["; color: #ff707055; }
    .word-token.intrusion::after  { content: "]"; color: #ff707055; }

    /* ---- STATS BAR ---- */
    .stats-bar {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: #404060;
      letter-spacing: 1px;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    /* ---- STATUS LABEL ---- */
    .status-label {
      font-size: 0.7rem;
      color: #606080;
      letter-spacing: 2px;
    }

    /* ---- PHRASE BOX ---- */
    .phrase-box {
      padding: 1.4rem 1.6rem;
      background: #0c0c18;
      border: 1px solid #3a2a60;
      text-align: center;
    }
    .phrase-text {
      font-size: 1.3rem;
      color: #c8aaff;
      font-style: italic;
      letter-spacing: 1px;
    }

    /* ---- EXPLANATION BOX ---- */
    .explanation-box {
      padding: 1rem 1.2rem;
      background: #0c0c18;
      border: 1px solid #1e1e30;
      color: #808098;
      font-size: 0.82rem;
      line-height: 1.7;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
      h1 { font-size: 1.3rem; letter-spacing: 3px; }
      .btn { font-size: 0.7rem; padding: 0.4rem 0.7rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>The Slang Compiler</h1>
    <p class="subtitle">Seed a word. Permit interruptions. See what language survives.</p>
  </header>

  <!-- SEED INPUT -->
  <div class="section">
    <label>Seed Term</label>
    <input type="text" id="seedInput" placeholder="one word…" maxlength="40"
           onkeydown="if(event.key==='Enter') compile()">
    <div class="chips">
      <button class="chip" onclick="setSeed('history')">history</button>
      <button class="chip" onclick="setSeed('gravity')">gravity</button>
      <button class="chip" onclick="setSeed('love')">love</button>
      <button class="chip" onclick="setSeed('death')">death</button>
      <button class="chip" onclick="setSeed('truth')">truth</button>
      <button class="chip" onclick="setSeed('money')">money</button>
      <button class="chip" onclick="setSeed('memory')">memory</button>
      <button class="chip" onclick="setSeed('time')">time</button>
    </div>
  </div>

  <!-- INTRUSION RATE -->
  <div class="section">
    <label>Intrusion Rate</label>
    <div class="btn-group">
      <button class="btn active" id="r10" onclick="setRate(10, this)">Low — 1 in 10</button>
      <button class="btn"        id="r5"  onclick="setRate(5,  this)">Medium — 1 in 5</button>
      <button class="btn"        id="r3"  onclick="setRate(3,  this)">High — 1 in 3</button>
    </div>
  </div>

  <!-- STYLE TARGET -->
  <div class="section">
    <label>Style Target</label>
    <div class="btn-group">
      <button class="btn active" id="sSlang"   onclick="setStyle('slang',   this)">Slang</button>
      <button class="btn"        id="sProverb" onclick="setStyle('proverb', this)">Proverb</button>
      <button class="btn"        id="sMeme"    onclick="setStyle('meme',    this)">Meme</button>
      <button class="btn"        id="sMixed"   onclick="setStyle('mixed',   this)">Mixed</button>
    </div>
  </div>

  <!-- COMPILE -->
  <div class="section">
    <button class="compile-btn" id="compileBtn" onclick="compile()">▶ Compile</button>
  </div>

  <hr>

  <!-- OUTPUT -->
  <div id="output" style="display:none">

    <!-- WORD GRID -->
    <div class="section">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.6rem;">
        <span class="section-label" style="margin:0">Lexical Field</span>
        <span class="status-label" id="statusLabel">—</span>
      </div>
      <div class="word-grid" id="wordGrid"></div>
      <div class="stats-bar" id="statsBar"></div>
    </div>

    <!-- PHRASE -->
    <div class="section" id="phraseSection" style="display:none">
      <label>Phrase Distilled</label>
      <div class="phrase-box">
        <div class="phrase-text" id="phraseText"></div>
      </div>
    </div>

    <!-- EXPLANATION -->
    <div class="section" id="explanationSection" style="display:none">
      <label>Witness Report</label>
      <div class="explanation-box" id="explanationText"></div>
    </div>

  </div><!-- /output -->

// =============================================================
// PHRASE TEMPLATES by style
// w1 = dominant semantic word, w2 = secondary (may be intrusion)
// Add more templates here to increase variety.
// =============================================================

// =============================================================
// STATE
// =============================================================
let currentRate  = 10;
let currentStyle = 'slang';
let isCompiling  = false;

function setSeed(word) {
  document.getElementById('seedInput').value = word;
}

function setRate(rate, btn) {
  currentRate = rate;
  ['r10','r5','r3'].forEach(id => document.getElementById(id).classList.remove('active'));
  btn.classList.add('active');
}

function setStyle(style, btn) {
  currentStyle = style;

  btn.classList.add('active');
}

// =============================================================
// SEED EXPANSION
// Returns array of related words for the given seed.
// =============================================================
function expandSeed(seed) {
  const lower = seed.toLowerCase().trim();

  // Direct match
  if (semanticMap[lower]) return [...semanticMap[lower]];

  // Partial match (seed contains a known key, or key contains seed)
  for (const key of Object.keys(semanticMap)) {
    if (lower.includes(key) || key.includes(lower)) {
      return [...semanticMap[key]];
    }
  }

  // Multi-word: try each word
  const parts = lower.split(/\s+/);
  for (const part of parts) {
    if (semanticMap[part]) return [...semanticMap[part]];
    for (const key of Object.keys(semanticMap)) {
      if (part.includes(key) || key.includes(part)) return [...semanticMap[key]];
    }
  }

  // No match: return generic pool
  return [...genericPool];
}

// =============================================================
// SEQUENCE GENERATION
// Produces 100 tokens: mostly related, some intrusions.
// =============================================================
function generateSequence(seed, rate) {
  const related   = expandSeed(seed);
  // Include the seed word itself in the pool (weighted 3x)
  const seedWords = seed.toLowerCase().trim().split(/\s+/);
  const pool = [...related, ...seedWords, ...seedWords, ...seedWords];

  // Shuffle intrusion pool so each run picks different words
  const shuffledIntrusions = [...intrusionPool].sort(() => Math.random() - 0.5);
  let intrusionIdx = 0;

  const sequence = [];
  for (let i = 0; i < 100; i++) {
    const inject = Math.random() < 1 / rate;
    if (inject) {
      const w = shuffledIntrusions[intrusionIdx % shuffledIntrusions.length];
      intrusionIdx++;
      sequence.push({ word: w, isIntrusion: true });
    } else {
      // Avoid two identical consecutive words
      let w, tries = 0;
      do {
        w = pool[Math.floor(Math.random() * pool.length)];
        tries++;
      } while (sequence.length > 0 && sequence[sequence.length - 1].word === w && tries < 8);
      sequence.push({ word: w, isIntrusion: false });
    }
  }
  return sequence;
}

// =============================================================
// PHRASE SYNTHESIS
// Picks top semantic words and possibly one intrusion word,
// then fills a template.
// =============================================================
function synthesizePhrase(sequence, seed, style) {
  // Frequency count of related words
  const freq = {};
  const intrusions = [];
  for (const t of sequence) {
    if (t.isIntrusion) {
      intrusions.push(t.word);
    } else {
      freq[t.word] = (freq[t.word] || 0) + 1;
    }
  }

  const topWords = Object.entries(freq).sort((a, b) => b[1] - a[1]).map(e => e[0]);
  const w1 = topWords[0] || seed;

  // 50% chance the second slot is an intrusion (if any exist)
  const useIntrusion = intrusions.length > 0 && Math.random() < 0.5;
  const w2 = useIntrusion
    ? intrusions[Math.floor(Math.random() * intrusions.length)]
    : (topWords[1] || topWords[0]);

  // Resolve 'mixed' to a concrete style
  const styles = ['slang', 'proverb', 'meme'];
  const effectiveStyle = style === 'mixed'
    ? styles[Math.floor(Math.random() * styles.length)]
    : style;

  const templates = phraseTemplates[effectiveStyle] || phraseTemplates.slang;
  return templates[Math.floor(Math.random() * templates.length)](w1, w2);
}

// =============================================================
// EXPLANATION SYNTHESIS
// Describes what the compiler detected.
// =============================================================
function synthesizeExplanation(sequence, seed, rate, style) {
  const related    = sequence.filter(t => !t.isIntrusion);
  const intrusions = sequence.filter(t =>  t.isIntrusion);

  // Top 3 semantic words
  const freq = {};
  for (const t of related) freq[t.word] = (freq[t.word] || 0) + 1;
  const top3 = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 3).map(e => `"${e[0]}"`);

  const coherence  = rate >= 10 ? 'high' : rate >= 5 ? 'moderate' : 'low';
  const weirdness  = rate <= 3  ? 'high' : rate <= 5 ? 'moderate' : 'low';
  const driftState = coherence === 'high' ? 'stable' : 'unstable';

  const styleDescs = {
    slang:   'compressed, internet-adjacent slang',
    proverb: 'balanced, aphoristic proverb structure',
    meme:    'ironic, digitally self-aware meme logic',
    mixed:   'tonally mixed, cross-register'
  };

  let ex = `The lexical field around "${seed}" densified around ${top3.join(', ')}. `;

  if (intrusions.length === 0) {
    ex += `No singular points were detected — the field remained sealed. `;
  } else if (intrusions.length <= 8) {
    ex += `${intrusions.length} singular point${intrusions.length > 1 ? 's' : ''} broke through at a 1-in-${rate} rate — low enough that coherence held, but the intrusions left faint traces in the final phrase. `;
  } else if (intrusions.length <= 18) {
    ex += `${intrusions.length} singular points were injected at a 1-in-${rate} rate, creating productive tension between the semantic field and the intrusions — the phrase rides that fault line. `;
  } else {
    ex += `${intrusions.length} singular points flooded the field at a 1-in-${rate} rate, destabilizing the semantic core and pushing the output toward the surreal. `;
  }

  ex += `Semantic drift: ${driftState}. `;
  ex += `The compiler detected ${styleDescs[style] || styleDescs.mixed} tendencies. `;
  ex += `Weirdness index: ${weirdness}. Coherence: ${coherence}.`;
  return ex;
}

// =============================================================
// MAIN COMPILE FUNCTION
// =============================================================
async function compile() {
  const seed = document.getElementById('seedInput').value.trim();
  if (!seed) { alert('Enter a seed term to compile.'); return; }
  if (isCompiling) return;

  isCompiling = true;
  const btn = document.getElementById('compileBtn');
  btn.disabled = true;
  btn.textContent = '⟳ Compiling…';

  // Show output container, hide sub-sections
  document.getElementById('output').style.display = 'block';
  document.getElementById('phraseSection').style.display      = 'none';
  document.getElementById('explanationSection').style.display = 'none';
  document.getElementById('statsBar').textContent = '';

  const statusLabel = document.getElementById('statusLabel');
  const grid = document.getElementById('wordGrid');
  grid.innerHTML = '';
  statusLabel.textContent = 'compiling…';

  // Generate the sequence
  const sequence = generateSequence(seed, currentRate);

  // Helper: non-blocking pause
  const pause = ms => new Promise(r => setTimeout(r, ms));

  // Render words progressively
  for (let i = 0; i < sequence.length; i++) {
    const t = sequence[i];
    const span = document.createElement('span');
    span.className = 'word-token' + (t.isIntrusion ? ' intrusion' : '');
    span.textContent = t.word;
    if (t.isIntrusion) span.title = 'singular point (intrusion)';
    grid.appendChild(span);

    // Trigger CSS transition
    await pause(5);
    span.classList.add('visible');

    if (i % 10 === 9) statusLabel.textContent = `${i + 1} / 100`;
    await pause(28);
  }

  statusLabel.textContent = 'complete';

  // Stats bar
  const intCount = sequence.filter(t => t.isIntrusion).length;
  document.getElementById('statsBar').innerHTML =
    `<span>${100 - intCount} related words</span>` +
    `<span>${intCount} singular points</span>` +
    `<span>seed: "${seed}"</span>` +
    `<span>rate: 1 in ${currentRate}</span>`;

  // Phrase
  await pause(400);
  const phrase = synthesizePhrase(sequence, seed, currentStyle);
  document.getElementById('phraseText').textContent = '\u201C' + phrase + '\u201D';
  document.getElementById('phraseSection').style.display = 'block';

  // Explanation
  await pause(300);
  document.getElementById('explanationText').textContent =
    synthesizeExplanation(sequence, seed, currentRate, currentStyle);
  document.getElementById('explanationSection').style.display = 'block';

  btn.disabled = false;
  btn.textContent = '↺ Recompile';
  isCompiling = false;
}
</script>
